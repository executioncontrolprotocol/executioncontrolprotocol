apiVersion: ecp/v0.3-draft
kind: Context
metadata:
  name: full-featured
  version: 2.0.0
  description: Tests all spec features
inputs:
  projectId:
    type: string
    required: true
  limit:
    type: number
    default: 50
outputs:
  - name: report
    fromSchema: Report
schemas:
  Plan:
    type: object
    required: [selectedIds]
    properties:
      selectedIds:
        type: array
        items:
          type: string
      delegate:
        type: array
        items:
          type: object
          required: [executor, task]
          properties:
            executor:
              type: string
            task:
              type: string
  Findings:
    type: object
    required: [summary]
    properties:
      summary:
        type: string
  Report:
    type: object
    required: [title, body]
    properties:
      title:
        type: string
      body:
        type: string
triggers:
  - type: schedule
    cron: "0 9 * * MON"
    timezone: "America/Vancouver"
orchestration:
  entrypoint: orchestrator
  strategy: delegate
  defaults:
    maxDelegations: 2
    maxExecutors: 2
    timeoutMs: 60000
  requires:
    - Findings
  produces: Report
executors:
  - name: orchestrator
    type: agent
    model:
      provider: openai
      name: gpt-4o
    instructions: Produce a Plan.
    outputSchemaRef: "#/schemas/Plan"
    mounts:
      - name: seed_data
        stage: seed
        from:
          server: jira
          tool: issues.search
          args:
            project: "${inputs.projectId}"
            limit: 50
        limits:
          maxItems: 50
    policies:
      toolAccess:
        default: deny
        allow:
          - jira:issues.search
      budgets:
        maxToolCalls: 10
        maxRuntimeSeconds: 30
      writeControls:
        mode: forbid
  - name: analyst
    type: agent
    model:
      provider: openai
      name: gpt-4o
    outputSchemaRef: "#/schemas/Findings"
    mounts:
      - name: issue_details
        stage: focus
        when:
          selectorFrom: plan.selectedIds
          maxSelected: 5
        from:
          server: jira
          tool: issues.get
          args:
            issueId: "${item}"
        limits:
          maxItems: 5
    policies:
      toolAccess:
        default: deny
        allow:
          - jira:issues.get
      writeControls:
        mode: forbid
  - name: publisher
    type: agent
    model:
      provider: openai
      name: gpt-4o
    outputSchemaRef: "#/schemas/Report"
    policies:
      writeControls:
        mode: propose-only
        requireApprovalFor:
          - slack:messages.post
