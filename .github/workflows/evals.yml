name: evals

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model to use for evaluation"
        required: false
        default: "gemma3:1b"
        type: string
      provider:
        description: "Provider: ollama or openai"
        required: false
        default: "ollama"
        type: choice
        options:
          - ollama
          - openai
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  eval:
    name: eval
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Install Ollama
        if: inputs.provider != 'openai'
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        if: inputs.provider != 'openai'
        run: ollama serve &

      - name: Wait for Ollama
        if: inputs.provider != 'openai'
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Pull model
        if: inputs.provider != 'openai'
        run: ollama pull ${{ inputs.model || 'gemma3:1b' }}

      - name: Run single-executor eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npx ecp run \
            examples/single-executor/context.yaml \
            --input topic="Execution Control Protocol" \
            --provider ${{ inputs.provider || 'ollama' }} \
            --model ${{ inputs.model || 'gemma3:1b' }} \
            --debug

      - name: Run controller-specialist eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npx ecp run \
            examples/controller-specialist/context.yaml \
            --input subject="Model Context Protocol" \
            --provider ${{ inputs.provider || 'ollama' }} \
            --model ${{ inputs.model || 'gemma3:1b' }} \
            --debug

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_number }}
          path: artifacts/
          retention-days: 30
