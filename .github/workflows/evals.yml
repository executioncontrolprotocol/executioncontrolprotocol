name: evals

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Ollama model tag (must match pulled image)"
        required: false
        default: "gemma3:1b"
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  eval:
    name: eval
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # workflow_dispatch has github.event.inputs; scheduled runs do not — defaults apply.
      EVAL_MODEL: ${{ github.event.inputs.model || 'gemma3:1b' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Cache Ollama models
        id: ollama-models
        uses: actions/cache@v4
        with:
          path: .ollama-models
          key: ollama-models-${{ runner.os }}-${{ env.EVAL_MODEL }}-v1
          restore-keys: |
            ollama-models-${{ runner.os }}-

      - name: Start Ollama (Docker)
        run: |
          mkdir -p .ollama-models
          docker run -d --name ollama \
            -p 11434:11434 \
            -e OLLAMA_MODELS=/models \
            -v "${GITHUB_WORKSPACE}/.ollama-models:/models" \
            ollama/ollama:latest

      - name: Wait for Ollama
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "Ollama did not become ready in time" >&2
          exit 1

      - name: Pull model
        if: steps.ollama-models.outputs.cache-hit != 'true'
        run: docker exec ollama ollama pull "$EVAL_MODEL"

      - name: Run single-executor eval
        env:
          OLLAMA_MODEL: ${{ env.EVAL_MODEL }}
        run: |
          npx ecp run \
            examples/single-executor/context.yaml \
            --input topic="Execution Control Protocol" \
            --provider ollama \
            --model "$EVAL_MODEL" \
            \
            --debug

      - name: Run controller-specialist eval
        env:
          OLLAMA_MODEL: ${{ env.EVAL_MODEL }}
        run: |
          npx ecp run \
            examples/controller-specialist/context.yaml \
            --input subject="Model Context Protocol" \
            --provider ollama \
            --model "$EVAL_MODEL" \
            \
            --debug

      - name: Stop Ollama
        if: always()
        run: docker rm -f ollama || true

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_number }}
          path: artifacts/
          retention-days: 30
