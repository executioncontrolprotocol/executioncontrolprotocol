# Runs the full CI pipeline (build, lint, validate, unit/integration/e2e tests) on pushes and PRs.
# npm publish runs only on push to `main` (see `ci-pipeline.yml`).

name: ci

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pipeline:
    uses: ./.github/workflows/ci-pipeline.yml
    secrets: inherit
