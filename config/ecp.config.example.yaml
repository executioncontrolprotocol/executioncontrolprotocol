# ECP System Config — example
#
# Copy to ecp.config.yaml in the project root, or to ~/.ecp/config.yaml.
# Load at startup via: ecp run context.yaml --config ecp.config.yaml
# Or rely on default locations: ./ecp.config.yaml then ~/.ecp/config.yaml
#
# Contexts declare which extensions they use (extensions.providers); the
# runtime decides which of those are enabled via --enable or this config.

extensions:
  # Allow-list: only these extension IDs may be enabled at runtime.
  # CLI --enable and defaultEnable must be a subset of this list.
  allowEnable:
    - openai
    - ollama

  # Default extensions to enable when CLI does not pass --enable.
  defaultEnable:
    - openai

  # System-level extension security policy (optional).
  security:
    allowKinds: [model-provider]
    allowSourceTypes: [builtin]
    allowIds: [openai, ollama]

# ----------------------------------------------------------------------
# MCP tool servers (tool wiring)
#
# Tool wiring is configured globally (system config). Each server name
# here must match the `server` used in Context mounts/tool refs, e.g.
# `server: fetch` and tools like `fetch:fetch`.
toolServers:
  # Public MCP via stdio (example uses Docker to start the MCP server).
  fetch:
    transport:
      type: stdio
      command: docker
      args: [run, -i, --rm, mcp/fetch]

  # Deterministic local fake MCP server (TypeScript over stdio).
  # Assumes you run `ecp` from the repo root.
  test-jira:
    transport:
      type: stdio
      command: npx
      args: [tsx, examples/ollama-mcp-tools/servers/fake-mcp-server.ts]
      cwd: .

  # Example SSE transport.
  remote:
    transport:
      type: sse
      url: https://example.com/sse
