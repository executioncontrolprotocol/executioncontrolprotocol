# ECP System Config ΓÇË example (target v0.5+ layout)
#
# The file has two roles:
#   ΓÇó Top-level sections (`models`, `tools`, `executors`, `memory`, `agents`, `loggers`,
#     `secrets`, `plugins`, ΓÇ³) ΓÇË **configure** those capabilities (wiring, defaults, `config` blobs).
#   ΓÇó `security` ΓÇË **the same keys**, mirrored: what is **allowed** / **enabled by default**
#     for each area (allow-lists, defaults, and global plugin-extension rules under `security.plugins`).
#
# Copy to ecp.config.yaml in the project root, or to ~/.ecp/config.yaml.
# Load at startup: ecp run context.yaml --config ecp.config.yaml
# Default search order: ./ecp.config.yaml, ./ecp.config.json, then ~/.ecp/
#
# Context manifests declare plugins and execution shape; system `security` and CLI flags
# decide what is actually allowed at runtime.
#
# Generic `config` on every kind
# ------------------------------
# Aligns with PluginKind-style surfaces (provider, executor, logger, memory, tool, ΓÇ³):
# each keyed entry MAY include a sibling `config` object. ECP validates a small shared outer
# shape per section (e.g. transport + credentials for tools; defaultModel + supportedModels
# for model providers); provider- or plugin-specific keys (e.g. Ollama baseURL) live under
# `config` and are defined by that implementation, not by ECP core.
#
# Document version
# ----------------
# Top-level `version` is the schema version of this system config file (not the ECP release).
# Bump it when the on-disk shape changes in a breaking way; loaders may use it for validation
# and migration.

version: "0.5"

# ----------------------------------------------------------------------
# Security ΓÇË mirrors each capability area below: allow / default / gates only
# Edit via `ecp config security ΓÇ³` (allow/deny subcommands). Does not hold transport or secrets values.
# ----------------------------------------------------------------------

security:
  # Model providers ΓÇË keys under `models.providers`.
  models:
    allowProviders: [openai, ollama]
    defaultProviders: [openai]
    allowedModels:
      openai: [gpt-4o-mini, gpt-4o]
      ollama: [gemma3:1b, llama3.2:3b]

  # MCP tool servers ΓÇË logical names under `tools.servers`.
  tools:
    allowServers: [fetch, test-jira, remote, jira, confluence, shopify]

  # Executor plugins ΓÇË IDs under `executors.instances` (when configured).
  executors:
    allowExecutors: [myExecutor]
    defaultEnable: []

  # Memory stores ΓÇË IDs under `memory.stores`.
  memory:
    allowStores: [default]
    defaultStore: default

  # A2A specialists ΓÇË names under `agents.endpoints`.
  agents:
    allowEndpoints: [specialist_name]
    defaultEnable: []

  # Logger plugins ΓÇË IDs under `loggers.config`.
  loggers:
    allowEnable: [file]
    defaultEnable: [file]

  # Secret *provider* IDs that may be used (must align with `secrets.providers` when restricted).
  secrets:
    allowProviders: [os.secrets, dot.env]

  # Global plugin extension policy (PluginSecurityPolicy): kinds, allowSourceTypes (builtin|npm|git|local only),
  # id allow/deny, strict, allowThirdParty. Vendor gating: allowThirdParty (not a source-type literal).
  # CLI: `ecp config security plugins third-party enable|disable`,
  # `ecp config security plugins allow-source-type add|remove <type>`,
  # `ecp config security plugins update --allow-third-party` / `--no-allow-third-party`.
  # Not the same tree as top-level `plugins.installs` (artifact installs).
  plugins:
    allowKinds: [provider, executor, logger, memory, tool, third-party]
    allowSourceTypes: [builtin]
    allowIds: [openai, ollama, file, memory]
    # allowThirdParty: true

# ----------------------------------------------------------------------
# Plugins ΓÇË installs and packaged-plugin metadata (`ecp config plugins add|get|remove|update ΓÇ³`)
# Populated by the installer; not where allow-lists live. Each install accepts `config`.
# ----------------------------------------------------------------------

# plugins:
#   installs:
#     filesystem:
#       source: { type: npm, spec: "@modelcontextprotocol/server-filesystem@2026.1.14" }
#       path: ~/.ecp/plugins/filesystem
#       pluginKind: tool
#       version: "2026.1.14"
#       config: {}

# ----------------------------------------------------------------------
# Models ΓÇË model providers (`ecp config add|update --type models --provider <id> --default-model ΓÇ³ --supported-models ΓÇ³ --option key=value ΓÇ³` or `--file ΓÇ³`). Cross-provider fields at entry root;
# provider-specific options under `config`.
# ----------------------------------------------------------------------

models:
  providers:
    openai:
      defaultModel: gpt-4o-mini
      supportedModels: [gpt-4o-mini, gpt-4o]
      config: {}
    ollama:
      defaultModel: gemma3:1b
      supportedModels: [gemma3:1b, llama3.2:3b]
      config:
        baseURL: http://localhost:11434

# ----------------------------------------------------------------------
# Tools ΓÇË MCP servers (`ecp config add|update --type tools <name> --transport-type stdio|sse ΓÇ³` or `--file ΓÇ³`). Each server: transport (+ credentials) + `config`.
# ----------------------------------------------------------------------

tools:
  servers:
    fetch:
      transport:
        type: stdio
        command: docker
        args: [run, -i, --rm, mcp/fetch]
      config: {}
      # credentials:
      #   bindings:
      #     - name: TOKEN
      #       source: { provider: os.secrets, key: server/fetch.token }
      #       required: true
      #       delivery: env

    test-jira:
      transport:
        type: stdio
        command: npx
        args: [tsx, examples/ollama-mcp-tools/servers/fake-mcp-server.ts]
        cwd: .
      config: {}

    # Logical names used by repo root spec.yaml (weekly-ecom-ops mounts).
    jira:
      transport:
        type: stdio
        command: npx
        args: [tsx, examples/ollama-mcp-tools/servers/fake-mcp-server.ts]
        cwd: .
      config: {}

    confluence:
      transport:
        type: stdio
        command: npx
        args: [tsx, examples/ollama-mcp-tools/servers/fake-mcp-server.ts]
        cwd: .
      config: {}

    shopify:
      transport:
        type: stdio
        command: npx
        args: [tsx, examples/ollama-mcp-tools/servers/fake-mcp-server.ts]
        cwd: .
      config: {}

    remote:
      transport:
        type: sse
        url: https://example.com/sse
      config: {}

# ----------------------------------------------------------------------
# Executors ΓÇË system defaults for executor plugins (`ecp config executors` when implemented).
# ----------------------------------------------------------------------

executors:
  instances:
    myExecutor:
      config: {}

# ----------------------------------------------------------------------
# Memory ΓÇË long-term memory store defaults (`ecp config memory` when implemented).
# ----------------------------------------------------------------------

memory:
  stores:
    default:
      config: {}

# ----------------------------------------------------------------------
# Agents ΓÇË A2A specialists (`ecp config agents` CRUD planned).
# ----------------------------------------------------------------------

agents:
  endpoints:
    specialist_name:
      url: https://example.com/a2a
      config: {}

# ----------------------------------------------------------------------
# Loggers ΓÇË per-logger settings. Allow/default live under `security.loggers`.
# ----------------------------------------------------------------------

loggers:
  config:
    file:
      logDir: ~/.ecp/logs
      config: {}

# ----------------------------------------------------------------------
# Secrets ΓÇË policy and provider options (values live in keyring / env / .env / session).
# Which providers may run is gated by `security.secrets.allowProviders`.
#
# ecp config secrets add --provider os.secrets --key server/fetch.token --prompt
# ----------------------------------------------------------------------

# secrets:
#   defaultProvider: os.secrets
#   policy: warn
#   providers:
#     dot.env:
#       path: .env
