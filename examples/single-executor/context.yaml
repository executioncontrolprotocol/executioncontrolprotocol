apiVersion: ecp/v0.3-draft
kind: Context

metadata:
  name: hello-world
  version: 1.0.0
  description: Minimal single-executor example — summarize a topic

inputs:
  topic: { type: string, required: true }

outputs:
  - name: summary
    fromSchema: Summary

schemas:
  Summary:
    type: object
    required: [headline, body]
    properties:
      headline: { type: string }
      body: { type: string }

triggers:
  - type: manual

orchestration:
  entrypoint: summarizer
  strategy: single
  produces: Summary

executors:
  - name: summarizer
    type: agent
    model:
      provider: openai
      name: gpt-4o-mini
    instructions: |
      You are a concise summarizer.
      Given a topic, produce a JSON object with:
      - headline: a one-line summary
      - body: a 2-3 sentence explanation
    outputSchemaRef: "#/schemas/Summary"
    mounts: []
    policies:
      toolAccess:
        default: deny
      budgets:
        maxToolCalls: 0
        maxRuntimeSeconds: 30
        maxCostUsd: 0.10
      writeControls:
        mode: forbid
