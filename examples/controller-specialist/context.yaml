specVersion: ecp/v0.3-draft
kind: Context

metadata:
  name: research-report
  version: 1.0.0
  description: Controller-specialist example — orchestrate research across two specialists (Ollama, default gemma3:1b)

plugins:
  version: 1.0.0
  providers:
    - name: ollama
      kind: provider
      type: builtin
      version: 0.3.0
  security: {}

inputs:
  subject:
    type: string
    required: true
  depth:
    type: string
    default: "moderate"

outputs:
  - name: report
    fromSchema: Report

schemas:
  Plan:
    type: object
    required: [researchAreas, delegate]
    properties:
      researchAreas:
        type: array
        items:
          type: string
      delegate:
        type: array
        items:
          type: object
          required: [executor, task]
          properties:
            executor:
              type: string
            task:
              type: string

  TechnicalFindings:
    type: object
    required: [summary, keyPoints]
    properties:
      summary:
        type: string
      keyPoints:
        type: array
        items:
          type: object
          required: [point, detail]
          properties:
            point:
              type: string
            detail:
              type: string

  PracticalFindings:
    type: object
    required: [summary, applications]
    properties:
      summary:
        type: string
      applications:
        type: array
        items:
          type: object
          required: [application, reasoning]
          properties:
            application:
              type: string
            reasoning:
              type: string

  Report:
    type: object
    required: [title, summary, sections]
    properties:
      title:
        type: string
      summary:
        type: string
      sections:
        type: array
        items:
          type: object
          required: [heading, content]
          properties:
            heading:
              type: string
            content:
              type: string

triggers:
  - type: manual

orchestration:
  entrypoint: orchestrator
  strategy: delegate
  defaults:
    maxDelegations: 2
    maxExecutors: 2
    timeoutMs: 120000
  requires:
    - TechnicalFindings
    - PracticalFindings
  produces: Report

executors:
  - name: orchestrator
    type: agent
    model:
      provider:
        name: ollama
        type: builtin
        version: 0.3.0
      name: gemma3:1b
    instructions: |
      You are a research orchestrator.
      Given a subject and depth, produce a Plan that:
      1. Identifies 2-3 research areas
      2. Delegates to "technical_analyst" for technical depth
      3. Delegates to "practical_analyst" for practical applications
      Output a JSON Plan object.
    outputSchemaRef: "#/schemas/Plan"
    mounts: []
    policies:
      toolAccess:
        default: deny
      budgets:
        maxToolCalls: 1
        maxRuntimeSeconds: 30
      writeControls:
        mode: forbid

  - name: technical_analyst
    type: agent
    model:
      provider:
        name: ollama
        type: builtin
        version: 0.3.0
      name: gemma3:1b
    instructions: |
      You are a technical analyst.
      Given a research task, produce TechnicalFindings with a summary and key technical points.
      Be specific and evidence-based.
    outputSchemaRef: "#/schemas/TechnicalFindings"
    mounts: []
    policies:
      toolAccess:
        default: deny
      budgets:
        maxToolCalls: 1
        maxRuntimeSeconds: 30
      writeControls:
        mode: forbid

  - name: practical_analyst
    type: agent
    model:
      provider:
        name: ollama
        type: builtin
        version: 0.3.0
      name: gemma3:1b
    instructions: |
      You are a practical applications analyst.
      Given a research task, produce PracticalFindings with a summary and real-world applications.
      Focus on actionable insights.
    outputSchemaRef: "#/schemas/PracticalFindings"
    mounts: []
    policies:
      toolAccess:
        default: deny
      budgets:
        maxToolCalls: 1
        maxRuntimeSeconds: 30
      writeControls:
        mode: forbid

  - name: publisher
    type: agent
    model:
      provider:
        name: ollama
        type: builtin
        version: 0.3.0
      name: gemma3:1b
    instructions: |
      You are a report publisher.
      Merge the technical and practical findings into a cohesive Report.
      Include a title, executive summary, and organized sections.
    outputSchemaRef: "#/schemas/Report"
    mounts: []
    policies:
      toolAccess:
        default: deny
      budgets:
        maxToolCalls: 1
        maxRuntimeSeconds: 30
      writeControls:
        mode: forbid
