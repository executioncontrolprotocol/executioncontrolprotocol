specVersion: ecp/v0.5-draft
kind: Context

metadata:
  name: hello-world-ollama
  version: 1.0.0
  description: Minimal single-executor example with Ollama (gemma3:1b; same flow as single-executor)

plugins:
  version: 1.0.0
  providers:
    - name: ollama
      kind: provider
      type: builtin
      version: 0.3.0
  security: {}

inputs:
  topic:
    type: string
    required: true

outputs:
  - name: summary
    fromSchema: Summary

schemas:
  Summary:
    type: object
    required: [headline, body]
    properties:
      headline:
        type: string
      body:
        type: string

triggers:
  - type: manual

orchestration:
  entrypoint: summarizer
  strategy: single
  produces: Summary

executors:
  - name: summarizer
    type: agent
    model:
      provider:
        name: ollama
        type: builtin
        version: 0.3.0
      name: gemma3:1b
    instructions: |
      You are a concise summarizer.
      Given a topic, produce a JSON object with:
      - headline: a one-line summary
      - body: a 2-3 sentence explanation
    outputSchemaRef: "#/schemas/Summary"
    mounts: []
    policies:
      toolAccess:
        default: deny
      budgets:
        maxToolCalls: 1
        maxRuntimeSeconds: 30
      writeControls:
        mode: forbid
