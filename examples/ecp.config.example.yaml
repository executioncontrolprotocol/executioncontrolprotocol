# ECP system config — copy to ~/.ecp/config.yaml to use.
# See getDefaultConfigPaths() for resolution order.

plugins:
  allowEnable: [openai, ollama]
  defaultEnable: [ollama]

# Loggers receive the same events as the CLI (phase, steps, reasoning).
# Enable "file" to append a log to ~/.ecp/logs/ecp.log
loggers:
  allowEnable: [file]
  defaultEnable: [file]
  config:
    file:
      # Optional: override log directory (default: ~/.ecp/logs)
      # logDir: /path/to/logs
      # Optional: override log file name (default: ecp.log)
      # logFile: ecp.log

# Optional: secrets.policy (warn|strict|permissive) and ecp config secrets * commands.
# secrets:
#   policy: warn
#   providers:
#     dot.env: { path: .env }

# ----------------------------------------------------------------------
# MCP tool servers (tool wiring)
#
# Configure how ECP connects to MCP servers. Tool permissions come from
# each Context's `policies.toolAccess`, not from CLI flags.
toolServers:
  fetch:
    transport:
      type: stdio
      command: docker
      args: [run, -i, --rm, mcp/fetch]

  test-jira:
    transport:
      type: stdio
      command: npx
      args: [tsx, examples/ollama-mcp-tools/servers/fake-mcp-server.ts]
      cwd: .
