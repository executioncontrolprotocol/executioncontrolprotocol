# ECP system config — shorter example (v0.5). Copy to ~/.ecp/config.yaml or ./ecp.config.yaml.
# Full commented reference: ../config/ecp.config.example.yaml

version: "0.5"

security:
  models:
    allowProviders: [openai, ollama]
    defaultProviders: [ollama]
  tools:
    allowServers: [fetch, test-jira]
  executors:
    allowExecutors: [myExecutor]
    defaultEnable: []
  memory:
    allowStores: [default]
    defaultStore: default
  agents:
    allowEndpoints: [specialist_name]
    defaultEnable: []
  loggers:
    allowEnable: [file]
    defaultEnable: [file]
  secrets:
    allowProviders: [os.secrets, dot.env]
  plugins:
    allowKinds: [provider, executor, logger, memory, tool]
    allowSourceTypes: [builtin]
    allowIds: [openai, ollama]

models:
  providers:
    openai:
      defaultModel: gpt-4o-mini
      allowedModels: [gpt-4o-mini, gpt-4o]
      config: {}
    ollama:
      defaultModel: gemma3:1b
      allowedModels: [gemma3:1b, llama3.2:3b]
      config:
        baseURL: http://localhost:11434

tools:
  servers:
    fetch:
      transport:
        type: stdio
        command: docker
        args: [run, -i, --rm, mcp/fetch]
    test-jira:
      transport:
        type: stdio
        command: npx
        args: [tsx, examples/ollama-mcp-tools/servers/fake-mcp-server.ts]
        cwd: .

executors:
  instances:
    myExecutor:
      config: {}

memory:
  stores:
    default:
      config: {}

agents:
  endpoints:
    specialist_name:
      url: https://example.com/a2a
      config: {}

loggers:
  config:
    file: {}

